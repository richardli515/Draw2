<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>起两张</title>
<script src="/socket.io/socket.io.js"></script>
<script src="/gameCore.js"></script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:14px}
  .game{max-width:760px;margin:0 auto}
  .panel{background:#111827;border:1px solid #334155;border-radius:14px;padding:14px;margin-bottom:12px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  h1{font-size:28px;margin:8px 0 2px;font-weight:900}.subtitle{font-size:11px;opacity:.38;letter-spacing:.8px;margin-bottom:12px}
  h2{font-size:20px;margin:0 0 12px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;min-height:72px}
  input{background:#020617;color:#e5e7eb;border:1px solid #334155;border-radius:10px;padding:11px 12px;font-size:18px;width:120px;text-align:center;text-transform:uppercase}
  .card{width:58px;height:80px;border-radius:10px;background:#f8fafc;color:#111827;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;user-select:none;border:3px solid transparent;box-shadow:0 5px 10px rgba(0,0,0,.28)}
  .card.red{color:#dc2626}.card.selected{border-color:#38bdf8;transform:translateY(-5px)}.card.back{background:#1d4ed8;color:#bfdbfe;cursor:default}.table-card{width:50px;height:70px;font-size:18px;cursor:default}
  .joker-img{width:52px;height:72px;display:block;pointer-events:none}
  button{background:#2563eb;color:white;border:0;border-radius:10px;padding:11px 15px;font-size:16px;font-weight:800;cursor:pointer}
  button.secondary{background:#475569}button.danger{background:#dc2626}button.lang{font-size:13px;padding:8px 10px;background:#334155;opacity:.8}
  button:disabled{background:#334155;color:#94a3b8;cursor:not-allowed}
  .status{font-size:17px;font-weight:800;color:#facc15;line-height:1.5}.hint,.small{color:#cbd5e1;line-height:1.5;font-size:14px}.small{color:#94a3b8}.active{border-color:#facc15}.winner{font-size:22px;font-weight:900;color:#22c55e}
  .score{display:flex;gap:12px;flex-wrap:wrap}.scorebox{background:#020617;border:1px solid #334155;padding:10px 12px;border-radius:10px;min-width:120px}
  code{background:#020617;padding:2px 5px;border-radius:5px}.restart-row{min-height:auto;margin-top:12px;padding-top:10px;border-top:1px solid rgba(148,163,184,.18)}
  .hidden{display:none}.room-code{font-size:26px;font-weight:900;letter-spacing:4px;color:#22c55e}
  .badge{display:inline-block;background:#1d4ed8;color:#bfdbfe;padding:2px 8px;border-radius:6px;font-size:12px;margin-left:6px;font-weight:700}

  /* 可折叠规则 */
  .rule-toggle{background:none;border:1px solid #334155;color:#94a3b8;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .rule-toggle:hover{border-color:#64748b;color:#cbd5e1}
  .rule-body{overflow:hidden;max-height:0;transition:max-height .3s ease,opacity .3s ease;opacity:0}
  .rule-body.open{max-height:400px;opacity:1}

  /* 对手区紧凑 */
  #player1Panel{padding:8px 14px}
  #player1Panel h2{font-size:14px;color:#64748b;margin:0 0 6px;font-weight:600}
  #player1Panel .row{min-height:52px;gap:6px}
  #player1Panel .card{width:46px;height:64px;font-size:16px}
  #player1Panel .joker-img{width:40px;height:56px}

  /* 胜负 Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.show{opacity:1;pointer-events:all}
  .modal{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:32px 28px;text-align:center;max-width:320px;width:90%;transform:scale(.85);transition:transform .25s}
  .modal-overlay.show .modal{transform:scale(1)}
  .modal-icon{font-size:52px;margin-bottom:8px}
  .modal-title{font-size:26px;font-weight:900;margin-bottom:6px}
  .modal-title.win{color:#22c55e}.modal-title.lose{color:#ef4444}.modal-title.tie{color:#facc15}
  .modal-sub{font-size:14px;color:#94a3b8;margin-bottom:20px}
  .modal-btns{display:flex;gap:10px;justify-content:center}

  /* 胜利彩屑动画 */
  @keyframes confetti-fall{
    0%{transform:translateY(-10px) rotate(0deg);opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0}
  }
  .confetti{position:fixed;top:0;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:99;animation:confetti-fall linear forwards}
</style>
</head>
<body>
<div class="game">
  <div class="top">
    <div>
      <h1>起两张</h1>
      <div class="subtitle">draw2 · solo + online multiplayer</div>
    </div>
    <button id="langBtn" class="lang">EN</button>
  </div>

  <div class="panel" id="modePanel">
    <h2 data-i18n="chooseMode">选择模式</h2>
    <div class="row" style="min-height:auto">
      <button id="soloBtn" data-i18n="solo">单机模式</button>
      <button id="onlineBtn" class="secondary" data-i18n="online">联机模式</button>
    </div>
    <p class="small" data-i18n="modeHint">单机模式对战电脑；联机模式两人对战。</p>
    <div style="border-top:1px solid #334155;margin:12px 0 10px"></div>
    <p class="small" id="otherGamesLabel" style="margin:0 0 10px;color:#64748b">其他游戏</p>
    <div class="row" style="min-height:auto">
      <a href="/speed.html" style="text-decoration:none">
        <button id="speedBtn" style="background:#7c3aed">⚡ Speed</button>
      </a>
    </div>
  </div>

  <div class="panel hidden" id="lobbyPanel">
    <h2 data-i18n="onlineTitle">联机大厅</h2>
    <div class="hint" data-i18n="onlineHint">创建房间后把房间码发给朋友，对方输入房间码即可开局。</div>
    <div class="row" style="min-height:auto">
      <button id="hostBtn" data-i18n="host">创建房间</button>
      <input id="roomInput" maxlength="4" placeholder="房间码" />
      <button id="joinBtn" class="secondary" data-i18n="join">加入房间</button>
      <button id="backBtn" class="secondary" data-i18n="back">返回</button>
    </div>
    <div class="status" id="lobbyStatus"></div>
  </div>

  <div id="gameArea" class="hidden">
    <div class="panel">
      <div class="status" id="status">加载中...</div>
      <div class="score">
        <div class="scorebox"><span data-i18n="yourPile">你的出牌堆</span>：<b id="humanScore">0</b></div>
        <div class="scorebox"><span id="oppPileLabel" data-i18n="aiPile">电脑出牌堆</span>：<b id="aiScore">0</b></div>
        <div class="scorebox"><span data-i18n="drawPile">起牌牌堆</span>：<b id="deckInfo">0</b></div>
      </div>
      <div style="margin-top:10px">
        <button class="rule-toggle" id="ruleToggle" onclick="toggleRule()">📖 <span id="ruleToggleLabel">游戏规则</span> <span id="ruleArrow">▾</span></button>
        <div class="rule-body" id="ruleBody"><div class="hint" id="ruleHint" style="margin-top:8px"></div></div>
      </div>
    </div>

    <div class="panel" id="player1Panel"><h2 id="opponentLabel" data-i18n="computer">电脑</h2><div class="row" id="player1Cards"></div></div>
    <div class="panel"><h2 data-i18n="table">桌面</h2><div class="row" id="tableCards"></div><div class="small" id="tableInfo"></div></div>
    <div class="panel" id="player0Panel"><h2 data-i18n="you">你</h2><div class="row" id="player0Cards"></div></div>

    <div class="panel">
      <div class="row" style="min-height:auto">
        <button id="playBtn" data-i18n="play">出牌</button>
        <button id="passBtn" class="secondary">Pass</button>
      </div>
      <p class="small" data-i18n="instruction">点击你的 1 或 2 张牌，然后点「出牌」。</p>
      <div class="row restart-row">
        <button id="resetBtn" class="danger hidden" data-i18n="restart">重新开始</button>
        <button id="exitBtn" class="secondary" data-i18n="exit">退出</button>
      </div>
    </div>
  </div>
</div>

<!-- 胜负 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-btns">
      <button id="modalRestartBtn">再来一局</button>
      <button class="secondary" id="modalExitBtn">退出</button>
    </div>
  </div>
</div>

<script>
(function(){
const I18N={
 zh:{
  chooseMode:'选择模式', solo:'单机模式', online:'联机模式', back:'返回', exit:'退出', modeHint:'单机模式对战电脑；联机模式两人对战。',
  otherGames:'其他游戏', roomCodePlaceholder:'房间码', pageTitle:'起两张',
  onlineTitle:'联机大厅', onlineHint:'创建房间后把房间码发给朋友，对方输入房间码即可开局。',
  host:'创建房间', join:'加入房间',
  yourPile:'你的出牌堆', aiPile:'电脑出牌堆', oppPile:'对手出牌堆', drawPile:'起牌牌堆', table:'桌面', computer:'电脑', opponent:'对手', you:'你', play:'出牌', restart:'重新开始',
  instruction:'点击你的 1 或 2 张牌，然后点「出牌」。',
  rule:'计分规则：每次出的牌进入自己的出牌堆。起牌牌堆空后，不再补牌。先出完手牌的一方，把对方剩余手牌也收入自己的出牌堆。最后比较出牌堆数量，多者获胜。<br>牌型：单张、对子、两张顺子、王炸。顺子只允许 <code>34</code> 到 <code>KA</code>。小王+大王为王炸，可压任意牌型。',
  first:'你先手。', oppFirst:'对手先手。', current:'当前回合', emptyTable:'空桌。当前玩家可以任意合法出牌。', lastPlay:'上一手', invalid:'非法牌型。只能出单张、对子、34 到 KA 的两张顺子，或王炸。', select:'请先点选要出的牌。', cannotBeat:'压不上。请出更大的同类型牌、王炸，或者 Pass。', emptyPass:'空桌不能 Pass，必须出牌。', pass:'Pass。清桌，', continueFirst:'继续先手。',
  gameEnd:'游戏结束', humanWin:'你获胜！', aiWin:'电脑获胜。', oppWin:'对手获胜。', tie:'平局', yourPile2:'你的出牌堆', aiPile2:'电脑', oppPile2:'对手', cards:'张',
  modalWinIcon:'🎉', modalLoseIcon:'😞', modalTieIcon:'🤝',
  modalWinTitle:'你赢了！', modalLoseTitle:'你输了', modalTieTitle:'平局',
  ruleToggleLabel:'游戏规则', modalRestart:'再来一局', modalExit:'退出',
  roomCreated:'房间已创建：', roomReady:'对方已加入，开始对局！', joinFailed:'加入失败：', waiting:'等待对方加入...', oppLeft:'对手已离开。', oppTurn:'轮到对方出牌...', yourTurn:'轮到你出牌',
  notYourTurn:'还没轮到你。', cardNotInHand:'手牌不一致，请刷新。', actionFailed:'操作失败：',
  types:{single:'单张',pair:'对子',straight:'顺子',kingbomb:'王炸'}
 },
 en:{
  chooseMode:'Choose Mode', solo:'Solo Mode', online:'Online Mode', back:'Back', exit:'Exit', modeHint:'Solo plays vs computer. Online is two-player.',
  otherGames:'More Games', roomCodePlaceholder:'Room Code', pageTitle:'Draw2',
  onlineTitle:'Online Lobby', onlineHint:'Create a room and share the code, or enter a friend\'s code to join.',
  host:'Create Room', join:'Join Room',
  yourPile:'Your pile', aiPile:'Computer pile', oppPile:'Opponent pile', drawPile:'Draw pile', table:'Table', computer:'Computer', opponent:'Opponent', you:'You', play:'Play', restart:'Restart',
  instruction:'Select 1 or 2 cards, then tap Play.',
  rule:'Scoring: every played card goes into your own pile. When the draw pile is empty, no more cards are drawn. The first player to empty their hand takes the opponent\u2019s remaining hand into their pile. Higher pile count wins.<br>Hands: single, pair, two-card straight, Joker Bomb. Straights only run from <code>34</code> to <code>KA</code>. Small Joker + Big Joker is Joker Bomb and beats any hand type.',
  first:'You go first.', oppFirst:'Opponent goes first.', current:'Current turn', emptyTable:'Empty table. Current player may play any legal hand.', lastPlay:'Last play', invalid:'Invalid hand. Play a single, pair, 34-to-KA straight, or Joker Bomb.', select:'Select cards first.', cannotBeat:'Cannot beat it. Play a higher same-type hand, Joker Bomb, or Pass.', emptyPass:'Cannot Pass on an empty table. You must play.', pass:'passed. Table reset. ', continueFirst:' continues first.',
  gameEnd:'Game over', humanWin:'You win!', aiWin:'Computer wins.', oppWin:'Opponent wins.', tie:'Tie', yourPile2:'Your pile', aiPile2:'computer', oppPile2:'opponent', cards:'cards',
  modalWinIcon:'🎉', modalLoseIcon:'😞', modalTieIcon:'🤝',
  modalWinTitle:'You Win!', modalLoseTitle:'You Lose', modalTieTitle:'Tie Game',
  ruleToggleLabel:'Rules', modalRestart:'Play Again', modalExit:'Exit',
  roomCreated:'Room created: ', roomReady:'Opponent joined. Starting game!', joinFailed:'Join failed: ', waiting:'Waiting for opponent...', oppLeft:'Opponent left.', oppTurn:'Opponent\'s turn...', yourTurn:'Your turn',
  notYourTurn:'Not your turn.', cardNotInHand:'Hand out of sync, please refresh.', actionFailed:'Action failed: ',
  types:{single:'single',pair:'pair',straight:'straight',kingbomb:'Joker Bomb'}
 }
};

let lang='zh';
const HUMAN=0,AI=1;

// 模式：'solo' 或 'online'
let mode = null;

// === 单机状态 ===
let soloState = null;
let soloSelectedIds = [];

// === 联机状态 ===
let socket = null;
let onlineView = null;       // 服务端推过来的视图
let onlineSelectedIds = [];
let onlineYourIndex = null;  // 自己是 0 还是 1
let onlineRoomCode = null;

function tr(k){return I18N[lang][k]}
function typeLabel(t){return I18N[lang].types[t]||'?'}
function txt(c){return c.rank+(c.suit||'')}
function jokerSrc(c){if(c.rank==='小王')return'./joker-small.svg';if(c.rank==='大王')return'./joker-big.svg';return null}
function red(c){return c.suit==='♥'||c.suit==='♦'}

function applyLang(){
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  document.title=tr('pageTitle');
  document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中文';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=tr(el.dataset.i18n)});
  document.getElementById('ruleHint').innerHTML=tr('rule');
  document.getElementById('otherGamesLabel').textContent=tr('otherGames');
  document.getElementById('roomInput').placeholder=tr('roomCodePlaceholder');
  document.getElementById('ruleToggleLabel').textContent=tr('ruleToggleLabel');
  document.getElementById('modalRestartBtn').textContent=tr('modalRestart');
  document.getElementById('modalExitBtn').textContent=tr('modalExit');
  if(mode==='online'){
    document.getElementById('opponentLabel').textContent=tr('opponent');
    document.getElementById('oppPileLabel').textContent=tr('oppPile');
  } else {
    document.getElementById('opponentLabel').textContent=tr('computer');
    document.getElementById('oppPileLabel').textContent=tr('aiPile');
  }
  render();
}

// ===== 单机逻辑（使用 GameCore） =====
function soloPlayerName(i){return i===HUMAN?tr('you'):tr('computer')}

function soloInit(){
  soloState = GameCore.newGame(HUMAN);
  soloSelectedIds = [];
  soloState.message = tr('first');
  render();
}

function soloToggle(id){
  if(soloState.gameOver || soloState.currentPlayer !== HUMAN) return;
  if(soloSelectedIds.includes(id)){
    soloSelectedIds = soloSelectedIds.filter(x=>x!==id);
  } else {
    if(soloSelectedIds.length>=2) return;
    soloSelectedIds.push(id);
  }
  render();
}

function soloPlay(){
  if(soloState.gameOver || soloState.currentPlayer !== HUMAN) return;
  if(soloSelectedIds.length===0){
    soloState.message = tr('select');
    render();
    return;
  }
  const result = GameCore.validatePlay(soloState, HUMAN, soloSelectedIds);
  if(!result.ok){
    if(result.reason==='cannotBeat') soloState.message = tr('cannotBeat');
    else soloState.message = tr('invalid');
    render();
    return;
  }
  const cards = result.cards;
  GameCore.applyPlay(soloState, HUMAN, cards);
  soloSelectedIds = [];
  soloState.message = soloPlayerName(HUMAN)+' '+(lang==='zh'?'出了':'played')+' '+cards.map(txt).join(' ')+'（'+typeLabel(GameCore.handType(cards))+'）。';
  soloCheckGameOverMessage();
  render();
  soloAiLater();
}

function soloPass(){
  if(soloState.gameOver || soloState.currentPlayer !== HUMAN) return;
  const result = GameCore.validatePass(soloState, HUMAN);
  if(!result.ok){
    soloState.message = tr('emptyPass');
    render();
    return;
  }
  GameCore.applyPass(soloState, HUMAN);
  soloSelectedIds = [];
  soloState.message = soloPlayerName(HUMAN)+' '+tr('pass')+soloPlayerName(soloState.currentPlayer)+tr('continueFirst');
  render();
  soloAiLater();
}

function soloCheckGameOverMessage(){
  if(!soloState.gameOver) return;
  const hs = soloState.players[HUMAN].pile.length;
  const as = soloState.players[AI].pile.length;
  if(soloState.winner===HUMAN) soloState.message = tr('gameEnd')+'：'+tr('humanWin')+' '+tr('yourPile2')+' '+hs+' '+tr('cards')+'，'+tr('aiPile2')+' '+as+' '+tr('cards')+'。';
  else if(soloState.winner===AI) soloState.message = tr('gameEnd')+'：'+tr('aiWin')+' '+tr('aiPile2')+' '+as+' '+tr('cards')+'，'+tr('yourPile2')+' '+hs+' '+tr('cards')+'。';
  else soloState.message = tr('gameEnd')+'：'+tr('tie')+'，'+hs+' '+tr('cards')+'。';
}

function soloAiLater(){
  if(soloState.gameOver || soloState.currentPlayer !== AI) return;
  setTimeout(()=>{
    if(soloState.gameOver || soloState.currentPlayer !== AI) return;
    const play = GameCore.chooseAi(soloState, AI);
    if(play){
      GameCore.applyPlay(soloState, AI, play);
      soloState.message = soloPlayerName(AI)+' '+(lang==='zh'?'出了':'played')+' '+play.map(txt).join(' ')+'（'+typeLabel(GameCore.handType(play))+'）。';
    } else {
      GameCore.applyPass(soloState, AI);
      soloState.message = soloPlayerName(AI)+' '+tr('pass')+soloPlayerName(soloState.currentPlayer)+tr('continueFirst');
    }
    soloCheckGameOverMessage();
    render();
    if(!soloState.gameOver && soloState.currentPlayer === AI) soloAiLater();
  }, 500);
}

// ===== 联机逻辑 =====
function onlineToggle(id){
  if(!onlineView || onlineView.gameOver) return;
  if(onlineView.currentPlayer !== onlineYourIndex) return;
  if(onlineSelectedIds.includes(id)){
    onlineSelectedIds = onlineSelectedIds.filter(x=>x!==id);
  } else {
    if(onlineSelectedIds.length>=2) return;
    onlineSelectedIds.push(id);
  }
  render();
}

function onlinePlay(){
  if(!socket || !onlineView) return;
  if(onlineView.currentPlayer !== onlineYourIndex) return;
  if(onlineSelectedIds.length === 0) {
    showTempMessage(tr('select'));
    return;
  }
  socket.emit('playCards', { cardIds: onlineSelectedIds });
}

function onlinePass(){
  if(!socket || !onlineView) return;
  if(onlineView.currentPlayer !== onlineYourIndex) return;
  socket.emit('passTurn');
}

function showTempMessage(msg){
  const el = document.getElementById('status');
  const prev = el.innerHTML;
  el.textContent = msg;
  setTimeout(()=>{ render(); }, 1500);
}

function getSocket(){
  if(socket) return socket;
  socket = io();

  socket.on('roomCreated', (code)=>{
    onlineRoomCode = code;
    document.getElementById('lobbyStatus').innerHTML = tr('roomCreated')+'<span class="room-code">'+code+'</span><br>'+tr('waiting');
  });

  socket.on('roomReady', (code)=>{
    onlineRoomCode = code;
    document.getElementById('lobbyStatus').textContent = tr('roomReady');
  });

  socket.on('joinFailed', (msg)=>{
    document.getElementById('lobbyStatus').textContent = tr('joinFailed')+msg;
  });

  socket.on('gameStart', (data)=>{
    onlineYourIndex = data.yourIndex;
    onlineSelectedIds = [];
    onlineView = null;
    // 切到游戏界面
    document.getElementById('modePanel').classList.add('hidden');
    document.getElementById('lobbyPanel').classList.add('hidden');
    document.getElementById('gameArea').classList.remove('hidden');
    applyLang();
    // 显示先手提示
    const iGoFirst = data.firstPlayer === onlineYourIndex;
    document.getElementById('status').textContent = iGoFirst ? tr('first') : tr('oppFirst');
  });

  socket.on('stateUpdate', (view)=>{
    onlineView = view;
    // 如果服务端剔除了已被打出的牌，本地 selected 可能引用不存在的 id，清理一下
    onlineSelectedIds = onlineSelectedIds.filter(id => view.you.hand.some(c=>c.id===id));
    render();
  });

  socket.on('actionError', (reason)=>{
    const map = {
      notYourTurn: tr('notYourTurn'),
      cannotBeat: tr('cannotBeat'),
      invalid: tr('invalid'),
      emptyPass: tr('emptyPass'),
      cardNotInHand: tr('cardNotInHand'),
      gameOver: tr('gameEnd'),
      gameNotOver: '',
      opponentLeft: tr('oppLeft')
    };
    const msg = map[reason] || (tr('actionFailed')+reason);
    if(msg) showTempMessage(msg);
  });

  socket.on('opponentLeft', ()=>{
    if(mode==='online'){
      showTempMessage(tr('oppLeft'));
    } else {
      document.getElementById('lobbyStatus').textContent = tr('oppLeft');
    }
  });

  return socket;
}

// ===== 渲染（统一） =====
function renderTable(){
  const el = document.getElementById('tableCards');
  el.innerHTML = '';
  let lastPlay = null;
  if(mode==='solo' && soloState) lastPlay = soloState.lastPlay;
  else if(mode==='online' && onlineView) lastPlay = onlineView.lastPlay;
  const cards = lastPlay ? lastPlay.cards : [];
  cards.forEach(c=>{
    const d = document.createElement('div');
    d.className = 'card table-card';
    const js = jokerSrc(c);
    if(js){
      const img = document.createElement('img');
      img.src = js; img.alt = c.rank; img.className = 'joker-img';
      d.appendChild(img);
    } else {
      if(red(c)) d.classList.add('red');
      d.textContent = txt(c);
    }
    el.appendChild(d);
  });
  const info = document.getElementById('tableInfo');
  if(lastPlay){
    let name;
    if(mode==='solo'){
      name = soloPlayerName(lastPlay.playerIndex);
    } else {
      name = lastPlay.playerIndex===onlineYourIndex ? tr('you') : tr('opponent');
    }
    info.textContent = tr('lastPlay')+'：'+name+'，'+typeLabel(GameCore.handType(lastPlay.cards))+'，'+lastPlay.cards.map(txt).join(' ');
  } else {
    info.textContent = tr('emptyTable');
  }
}

function renderCard(c, opts){
  const d = document.createElement('div');
  d.className = 'card';
  if(opts.back){
    d.classList.add('back');
    d.textContent = '🂠';
    return d;
  }
  const js = jokerSrc(c);
  if(js){
    const img = document.createElement('img');
    img.src = js; img.alt = c.rank; img.className = 'joker-img';
    d.appendChild(img);
  } else {
    if(red(c)) d.classList.add('red');
    d.textContent = txt(c);
  }
  if(opts.selected) d.classList.add('selected');
  if(opts.onclick) d.onclick = opts.onclick;
  return d;
}

function renderHands(){
  const youEl = document.getElementById('player0Cards');
  const oppEl = document.getElementById('player1Cards');
  youEl.innerHTML = ''; oppEl.innerHTML = '';

  if(mode==='solo' && soloState){
    soloState.players[HUMAN].hand.forEach(c=>{
      youEl.appendChild(renderCard(c, {
        selected: soloSelectedIds.includes(c.id),
        onclick: ()=>soloToggle(c.id)
      }));
    });
    soloState.players[AI].hand.forEach(c=>{
      oppEl.appendChild(renderCard(c, { back: !soloState.gameOver }));
    });
  } else if(mode==='online' && onlineView){
    onlineView.you.hand.forEach(c=>{
      youEl.appendChild(renderCard(c, {
        selected: onlineSelectedIds.includes(c.id),
        onclick: ()=>onlineToggle(c.id)
      }));
    });
    // 对方手牌按数量显示牌背
    for(let i=0; i<onlineView.opponent.handCount; i++){
      oppEl.appendChild(renderCard(null, { back: true }));
    }
  }
}

function render(){
  if(!mode) return;

  if(mode==='solo'){
    if(!soloState) return;
    const ht = soloState.currentPlayer === HUMAN && !soloState.gameOver;
    document.getElementById('status').innerHTML = soloState.gameOver
      ? '' : (soloState.message||'')+'<br>'+tr('current')+'：'+soloPlayerName(soloState.currentPlayer);
    document.getElementById('humanScore').textContent = soloState.players[HUMAN].pile.length;
    document.getElementById('aiScore').textContent = soloState.players[AI].pile.length;
    document.getElementById('deckInfo').textContent = soloState.deck.length;
    document.getElementById('player0Panel').classList.toggle('active', ht);
    document.getElementById('player1Panel').classList.toggle('active', soloState.currentPlayer===AI && !soloState.gameOver);
    document.getElementById('playBtn').disabled = !ht;
    document.getElementById('passBtn').disabled = !ht;
    if(soloState.gameOver){
      const hs=soloState.players[HUMAN].pile.length, as=soloState.players[AI].pile.length;
      const won=soloState.winner===HUMAN, tied=soloState.winner===-1||soloState.winner===null;
      showModal(
        tied?'tie': won?'win':'lose',
        tied?`${hs} vs ${as}`: won?`${tr('yourPile2')} ${hs} ${tr('cards')}`:`${tr('aiPile2')} ${as} ${tr('cards')}`,
        true
      );
    }
  } else if(mode==='online'){
    if(!onlineView){
      document.getElementById('status').textContent = tr('waiting');
      document.getElementById('playBtn').disabled = true;
      document.getElementById('passBtn').disabled = true;
      return;
    }
    const myTurn = onlineView.currentPlayer === onlineYourIndex && !onlineView.gameOver;
    const statusMsg = onlineView.gameOver ? '' :
      (myTurn ? tr('yourTurn') : tr('oppTurn'))+'<br>'+tr('current')+'：'+(myTurn?tr('you'):tr('opponent'));
    document.getElementById('status').innerHTML = statusMsg;
    document.getElementById('humanScore').textContent = onlineView.you.pile;
    document.getElementById('aiScore').textContent = onlineView.opponent.pile;
    document.getElementById('deckInfo').textContent = onlineView.deckCount;
    document.getElementById('player0Panel').classList.toggle('active', myTurn);
    document.getElementById('player1Panel').classList.toggle('active', !myTurn && !onlineView.gameOver);
    document.getElementById('playBtn').disabled = !myTurn;
    document.getElementById('passBtn').disabled = !myTurn;
    if(onlineView.gameOver){
      const ys=onlineView.you.pile, os=onlineView.opponent.pile;
      const won=onlineView.winner===onlineYourIndex, tied=onlineView.winner===-1;
      showModal(
        tied?'tie': won?'win':'lose',
        `${tr('yourPile2')} ${ys} ${tr('cards')} · ${tr('oppPile2')} ${os} ${tr('cards')}`,
        true
      );
    }
  }

  renderTable();
  renderHands();
}

// ── 折叠规则 ──
function toggleRule(){
  const body = document.getElementById('ruleBody');
  const arrow = document.getElementById('ruleArrow');
  const open = body.classList.toggle('open');
  arrow.textContent = open ? '▴' : '▾';
}
window.toggleRule = toggleRule;

// ── Modal ──
let _modalShown = false;
function showModal(type, sub, canRestart){
  if(_modalShown) return;
  _modalShown = true;
  document.getElementById('modalIcon').textContent = tr('modal'+type.charAt(0).toUpperCase()+type.slice(1)+'Icon');
  const titleEl = document.getElementById('modalTitle');
  titleEl.textContent = tr('modal'+type.charAt(0).toUpperCase()+type.slice(1)+'Title');
  titleEl.className = 'modal-title '+type;
  document.getElementById('modalSub').textContent = sub;
  document.getElementById('modalRestartBtn').classList.toggle('hidden', !canRestart);
  document.getElementById('modalOverlay').classList.add('show');
  if(type==='win') launchConfetti();
}

function hideModal(){
  _modalShown = false;
  document.getElementById('modalOverlay').classList.remove('show');
}

// ── 彩屑 ──
function launchConfetti(){
  const colors=['#22c55e','#3b82f6','#f59e0b','#ef4444','#a855f7','#06b6d4'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[i%colors.length]};`+
      `animation-duration:${1.2+Math.random()*1.4}s;animation-delay:${Math.random()*0.5}s;`+
      `width:${6+Math.random()*6}px;height:${6+Math.random()*6}px`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ===== 模式切换 =====
function showMode(){
  mode = null;
  hideModal();
  document.getElementById('modePanel').classList.remove('hidden');
  document.getElementById('lobbyPanel').classList.add('hidden');
  document.getElementById('gameArea').classList.add('hidden');
}

function startSolo(){
  mode = 'solo';
  document.getElementById('modePanel').classList.add('hidden');
  document.getElementById('lobbyPanel').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');
  applyLang(); // 更新对手标签
  soloInit();
}

function startOnlineLobby(){
  mode = null; // 还没真正进局
  document.getElementById('modePanel').classList.add('hidden');
  document.getElementById('lobbyPanel').classList.remove('hidden');
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('lobbyStatus').textContent = '';
  getSocket(); // 预连接
}

function exitGame(){
  // 联机模式下回到主菜单；服务端 disconnect 在断开 socket 时触发
  if(mode==='online' && socket){
    socket.disconnect();
    socket = null;
    onlineView = null;
    onlineYourIndex = null;
    onlineRoomCode = null;
    onlineSelectedIds = [];
  }
  mode = null;
  showMode();
}

function restartGame(){
  hideModal();
  if(mode==='solo'){
    soloInit();
  } else if(mode==='online'){
    if(socket && onlineView && onlineView.gameOver){
      socket.emit('requestRestart');
    }
  }
}

document.getElementById('soloBtn').addEventListener('click', startSolo);
document.getElementById('onlineBtn').addEventListener('click', startOnlineLobby);
document.getElementById('backBtn').addEventListener('click', ()=>{
  if(socket){ socket.disconnect(); socket = null; }
  showMode();
});
document.getElementById('hostBtn').addEventListener('click', ()=>{
  mode = 'online';
  getSocket().emit('createRoom');
});
document.getElementById('joinBtn').addEventListener('click', ()=>{
  mode = 'online';
  getSocket().emit('joinRoom', document.getElementById('roomInput').value);
});
document.getElementById('playBtn').addEventListener('click', ()=>{
  if(mode==='solo') soloPlay();
  else if(mode==='online') onlinePlay();
});
document.getElementById('passBtn').addEventListener('click', ()=>{
  if(mode==='solo') soloPass();
  else if(mode==='online') onlinePass();
});
document.getElementById('resetBtn').addEventListener('click', restartGame);
document.getElementById('exitBtn').addEventListener('click', exitGame);
document.getElementById('modalRestartBtn').addEventListener('click', restartGame);
document.getElementById('modalExitBtn').addEventListener('click', ()=>{ hideModal(); exitGame(); });
document.getElementById('langBtn').addEventListener('click', ()=>{
  lang = lang==='zh'?'en':'zh';
  applyLang();
});

applyLang();
showMode();
})();
</script>
